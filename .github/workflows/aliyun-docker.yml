name: Build and Push to Aliyun ACR

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual trigger

env:
  ALIYUN_REGISTRY: crpi-laul1izptqrf0tkf.cn-beijing.personal.cr.aliyuncs.com
  ALIYUN_NAMESPACE: owl234-arl-prod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Pull and Push Official Images
        run: |
          # Pull official images, tag them for Aliyun, and push
          docker pull mongo:4.0.27
          docker tag mongo:4.0.27 ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/mongo:4.0.27
          docker push ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/mongo:4.0.27
          
          docker pull rabbitmq:3-management
          docker tag rabbitmq:3-management ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/rabbitmq:3-management
          docker push ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/rabbitmq:3-management

          docker pull willfarrell/autoheal:latest
          docker tag willfarrell/autoheal:latest ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/autoheal:latest
          docker push ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/autoheal:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/arl-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pre-build check for critical deployment files
        run: |
          if ! grep -q "COPY ./version.txt ./start-prod.sh ./docker-compose.prod.yml" Dockerfile.prod; then
            echo "::error::Dockerfile.prod is missing the critical COPY instruction for deployment scripts. This will break the domestic one-click deployment!"
            exit 1
          fi

      - name: Build and push Web and Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/arl-web:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/arl-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OSINT Service
        uses: docker/build-push-action@v6
        with:
          context: ./backend/osint_service
          platforms: linux/amd64
          push: true
          tags: ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/osint-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
