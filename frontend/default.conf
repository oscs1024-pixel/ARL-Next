server {
    listen       80;
    server_name  localhost;

    # 开启 HTTP Basic Auth 阻挡被动扫描
    auth_basic "Restricted Access - AntiScan";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # 开启 gzip 压缩加速静态资源加载
    gzip on;
    gzip_static on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    # 必须开启 gzip_proxied 才能压缩代理转发的 API 响应内容
    gzip_proxied any;

    # 1. 静态文件代理 (Vue3)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 核心防坑：单页应用必须加这一句，防止 Vue 路由刷新时报 404
        try_files $uri $uri/ /index.html;
    }

    # 针对静态资源添加长缓存
    location ^~ /assets/ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 2. 核心：动态 API 请求反向代理
    # ARL 系统的接口默认都有 /api/ 前缀
    location /api/ {
        auth_basic off; # API 采用自带 Token 鉴权，关闭基础认证避免拦截脚本和 MCP 服务
        # 这里的 backend 就是我们在 docker-compose 里给 Python 容器取的名字
        proxy_pass http://arl-web:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}